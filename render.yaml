services:
  - type: web
    name: outpass
    runtime: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: USE_DEMO_DATA
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
